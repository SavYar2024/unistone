<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <radialGradient id="bg-ip" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0c1e35"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <linearGradient id="roofL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5e"/>
      <stop offset="100%" stop-color="#0d1e30"/>
    </linearGradient>
    <linearGradient id="wallL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142234"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="roadL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1c2c"/>
      <stop offset="100%" stop-color="#080f18"/>
    </linearGradient>
    <filter id="gf3"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="gf4"><feGaussianBlur stdDeviation="6"/></filter>
    <radialGradient id="glowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d6cf0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d6cf0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-ip)" rx="24"/>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="250" rx="250" ry="120" fill="url(#glowC)" filter="url(#gf3)"/>

  <!-- Ground -->
  <rect x="0" y="320" width="600" height="80" fill="#0a1520" rx="0"/>
  <rect x="0" y="318" width="600" height="3" fill="#1d6cf0" opacity="0.25"/>

  <!-- Roads - perspective grid -->
  <g fill="url(#roadL)">
    <rect x="130" y="300" width="40" height="100"/>
    <rect x="280" y="280" width="40" height="120"/>
    <rect x="430" y="300" width="40" height="100"/>
  </g>
  <!-- Road markings -->
  <g stroke="#cba15a" stroke-width="1.5" stroke-dasharray="12,10" opacity="0.3">
    <line x1="150" y1="310" x2="150" y2="400"/>
    <line x1="300" y1="310" x2="300" y2="400"/>
    <line x1="450" y1="310" x2="450" y2="400"/>
  </g>

  <!-- BUILDING 1 - Left large warehouse -->
  <rect x="40" y="200" width="140" height="120" fill="url(#wallL)" rx="3"/>
  <!-- Sawtooth roof -->
  <polygon points="40,200 90,175 90,200" fill="url(#roofL)"/>
  <polygon points="90,200 140,175 140,200" fill="url(#roofL)"/>
  <polygon points="140,200 180,175 180,200" fill="url(#roofL)"/>
  <!-- Skylights -->
  <rect x="65" y="176" width="18" height="22" fill="#1d6cf0" opacity="0.6" rx="1"/>
  <rect x="115" y="176" width="18" height="22" fill="#1d6cf0" opacity="0.5" rx="1"/>
  <rect x="157" y="176" width="18" height="22" fill="#1d6cf0" opacity="0.4" rx="1"/>
  <!-- Doors -->
  <rect x="60" y="268" width="35" height="52" fill="#1d3354" rx="2"/>
  <rect x="110" y="268" width="35" height="52" fill="#1d3354" rx="2"/>
  <!-- Windows -->
  <g fill="#4b93ff" opacity="0.5">
    <rect x="55" y="215" width="22" height="18" rx="1"/>
    <rect x="85" y="215" width="22" height="18" rx="1"/>
    <rect x="115" y="215" width="22" height="18" rx="1"/>
    <rect x="145" y="215" width="22" height="18" rx="1"/>
  </g>
  <!-- Loading dock glow -->
  <ellipse cx="78" cy="322" rx="20" ry="6" fill="#1d6cf0" opacity="0.2" filter="url(#gf4)"/>
  <ellipse cx="128" cy="322" rx="20" ry="6" fill="#1d6cf0" opacity="0.2" filter="url(#gf4)"/>

  <!-- BUILDING 2 - Center tall modern -->
  <rect x="220" y="155" width="160" height="165" fill="url(#wallL)" rx="4"/>
  <!-- Flat roof with edge detail -->
  <rect x="220" y="150" width="160" height="8" fill="#1d6cf0" opacity="0.5" rx="2"/>
  <!-- Glass facade panels -->
  <g fill="#1d6cf0" opacity="0.35">
    <rect x="228" y="162" width="35" height="28" rx="2"/>
    <rect x="270" y="162" width="35" height="28" rx="2"/>
    <rect x="312" y="162" width="35" height="28" rx="2"/>
    <rect x="354" y="162" width="18" height="28" rx="2"/>
  </g>
  <g fill="#1d6cf0" opacity="0.28">
    <rect x="228" y="198" width="35" height="28" rx="2"/>
    <rect x="270" y="198" width="35" height="28" rx="2"/>
    <rect x="312" y="198" width="35" height="28" rx="2"/>
    <rect x="354" y="198" width="18" height="28" rx="2"/>
  </g>
  <g fill="#4b93ff" opacity="0.22">
    <rect x="228" y="234" width="35" height="28" rx="2"/>
    <rect x="270" y="234" width="35" height="28" rx="2"/>
    <rect x="312" y="234" width="35" height="28" rx="2"/>
    <rect x="354" y="234" width="18" height="28" rx="2"/>
  </g>
  <!-- Entry lobby -->
  <rect x="270" y="285" width="60" height="35" fill="#1d4070" opacity="0.7" rx="2"/>
  <line x1="300" y1="285" x2="300" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Entry glow -->
  <ellipse cx="300" cy="325" rx="35" ry="8" fill="#1d6cf0" opacity="0.3" filter="url(#gf4)"/>
  <!-- Flagpole -->
  <line x1="390" y1="150" x2="390" y2="100" stroke="#2a4060" stroke-width="2"/>
  <rect x="390" y="100" width="25" height="16" fill="#cba15a" opacity="0.7" rx="1"/>
  <text x="391" y="112" font-family="Montserrat,sans-serif" font-size="5" fill="white" font-weight="800">UC</text>

  <!-- BUILDING 3 - Right warehouse -->
  <rect x="420" y="215" width="140" height="105" fill="url(#wallL)" rx="3"/>
  <polygon points="420,215 470,192 470,215" fill="url(#roofL)"/>
  <polygon points="470,215 520,192 520,215" fill="url(#roofL)"/>
  <polygon points="520,215 560,192 560,215" fill="url(#roofL)"/>
  <rect x="445" y="194" width="18" height="20" fill="#cba15a" opacity="0.5" rx="1"/>
  <rect x="496" y="194" width="18" height="20" fill="#cba15a" opacity="0.4" rx="1"/>
  <g fill="#4b93ff" opacity="0.45">
    <rect x="430" y="228" width="20" height="16" rx="1"/>
    <rect x="458" y="228" width="20" height="16" rx="1"/>
    <rect x="486" y="228" width="20" height="16" rx="1"/>
    <rect x="514" y="228" width="20" height="16" rx="1"/>
    <rect x="542" y="228" width="14" height="16" rx="1"/>
  </g>
  <rect x="455" y="275" width="32" height="45" fill="#1d3354" rx="2"/>
  <rect x="500" y="275" width="32" height="45" fill="#1d3354" rx="2"/>
  <ellipse cx="471" cy="322" rx="18" ry="5" fill="#cba15a" opacity="0.18" filter="url(#gf4)"/>

  <!-- Trees / landscaping -->
  <g>
    <ellipse cx="200" cy="305" rx="14" ry="18" fill="#0d2515" opacity="0.8"/>
    <line x1="200" y1="320" x2="200" y2="330" stroke="#0a1c10" stroke-width="3"/>
    <ellipse cx="215" cy="308" rx="10" ry="13" fill="#0f2c18" opacity="0.7"/>
    <ellipse cx="415" cy="310" rx="14" ry="18" fill="#0d2515" opacity="0.8"/>
    <line x1="415" y1="320" x2="415" y2="330" stroke="#0a1c10" stroke-width="3"/>
  </g>

  <!-- Parked trucks -->
  <g>
    <rect x="42" y="330" width="50" height="22" fill="#0f2035" rx="3"/>
    <rect x="32" y="334" width="14" height="16" fill="#162540" rx="2"/>
    <rect x="33" y="335" width="10" height="9" fill="#1d6cf0" opacity="0.4" rx="1"/>
    <rect x="540" y="330" width="50" height="22" fill="#0f2035" rx="3"/>
    <rect x="586" y="334" width="14" height="16" fill="#162540" rx="2"/>
    <rect x="587" y="335" width="10" height="9" fill="#4b93ff" opacity="0.35" rx="1"/>
  </g>

  <!-- Overhead connection lines (utility) -->
  <g stroke="rgba(29,108,240,0.2)" stroke-width="1" fill="none">
    <path d="M180,230 Q210,215 220,215"/>
    <path d="M380,215 Q405,215 420,230"/>
    <circle cx="180" cy="230" r="2" fill="#1d6cf0" opacity="0.5"/>
    <circle cx="420" cy="230" r="2" fill="#1d6cf0" opacity="0.5"/>
  </g>

  <!-- Label overlays -->
  <rect x="20" y="140" width="80" height="22" rx="11" fill="rgba(29,108,240,0.18)" stroke="rgba(29,108,240,0.35)" stroke-width="1"/>
  <text x="60" y="155" font-family="Montserrat,sans-serif" font-size="9" font-weight="700" fill="#8ab5ff" text-anchor="middle">ЗОНА A</text>

  <rect x="240" y="108" width="120" height="22" rx="11" fill="rgba(203,161,90,0.18)" stroke="rgba(203,161,90,0.35)" stroke-width="1"/>
  <text x="300" y="123" font-family="Montserrat,sans-serif" font-size="9" font-weight="700" fill="#f3d9a8" text-anchor="middle">ОФІС / УПРАВЛІННЯ</text>

  <rect x="460" y="155" width="80" height="22" rx="11" fill="rgba(29,108,240,0.18)" stroke="rgba(29,108,240,0.35)" stroke-width="1"/>
  <text x="500" y="170" font-family="Montserrat,sans-serif" font-size="9" font-weight="700" fill="#8ab5ff" text-anchor="middle">ЗОНА B</text>
</svg>
