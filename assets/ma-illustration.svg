<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <radialGradient id="bg-ma" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f38"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d6cf0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d6cf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba15a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cba15a" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="gf2"><feGaussianBlur stdDeviation="6"/></filter>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d6cf0"/>
      <stop offset="100%" stop-color="#cba15a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-ma)" rx="24"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="200" rx="160" ry="130" fill="url(#glow-blue)" filter="url(#gf)"/>
  <ellipse cx="400" cy="200" rx="160" ry="130" fill="url(#glow-gold)" filter="url(#gf)"/>

  <!-- Center connection line -->
  <line x1="140" y1="200" x2="460" y2="200" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <circle cx="300" cy="200" r="16" fill="url(#lineGrad)" opacity="0.9"/>
  <circle cx="300" cy="200" r="8" fill="white" opacity="0.95"/>
  <circle cx="300" cy="200" r="28" fill="url(#lineGrad)" opacity="0.2" filter="url(#gf2)"/>

  <!-- Left card - BUYER -->
  <rect x="40" y="120" width="190" height="160" rx="18" fill="url(#cardGrad)" stroke="rgba(29,108,240,0.4)" stroke-width="1.5"/>
  <!-- Card top accent -->
  <rect x="40" y="120" width="190" height="3" rx="2" fill="#1d6cf0" opacity="0.8"/>
  <!-- Building icon -->
  <g fill="#1d6cf0" opacity="0.9">
    <rect x="80" y="152" width="50" height="50" rx="3"/>
    <rect x="86" y="158" width="12" height="15" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="104" y="158" width="12" height="15" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="122" y="158" width="12" height="15" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="90" y="185" width="30" height="17" fill="rgba(255,255,255,0.3)" rx="1"/>
    <polygon points="67,155 105,135 143,155" fill="#4b93ff" opacity="0.7"/>
  </g>
  <text x="115" y="226" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#8ab5ff" text-anchor="middle" letter-spacing="1">ПОКУПЕЦЬ</text>
  <text x="115" y="244" font-family="Montserrat,sans-serif" font-size="10" fill="#6080a0" text-anchor="middle">від $1 000 000</text>
  <!-- Connection dot -->
  <circle cx="230" cy="200" r="5" fill="#1d6cf0"/>
  <circle cx="230" cy="200" r="10" fill="#1d6cf0" opacity="0.25" filter="url(#gf2)"/>

  <!-- Right card - SELLER -->
  <rect x="370" y="120" width="190" height="160" rx="18" fill="url(#cardGrad)" stroke="rgba(203,161,90,0.4)" stroke-width="1.5"/>
  <rect x="370" y="120" width="190" height="3" rx="2" fill="#cba15a" opacity="0.8"/>
  <!-- Factory icon -->
  <g transform="translate(410,148)">
    <rect x="0" y="20" width="70" height="35" rx="3" fill="#cba15a" opacity="0.85"/>
    <rect x="8" y="26" width="12" height="14" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="26" y="26" width="12" height="14" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="44" y="26" width="12" height="14" rx="1" fill="rgba(255,255,255,0.5)"/>
    <polygon points="0,22 35,6 70,22" fill="#e0b870" opacity="0.7"/>
    <rect x="15" y="0" width="6" height="22" fill="#b89040" rx="2"/>
    <rect x="40" y="5" width="5" height="17" fill="#b89040" rx="2"/>
    <rect x="29" y="39" width="12" height="16" fill="rgba(255,255,255,0.25)" rx="1"/>
  </g>
  <text x="465" y="226" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#f3d9a8" text-anchor="middle" letter-spacing="1">ПРОДАВЕЦЬ</text>
  <text x="465" y="244" font-family="Montserrat,sans-serif" font-size="10" fill="#907040" text-anchor="middle">Актив в Україні</text>
  <circle cx="370" cy="200" r="5" fill="#cba15a"/>
  <circle cx="370" cy="200" r="10" fill="#cba15a" opacity="0.25" filter="url(#gf2)"/>

  <!-- Center badge -->
  <text x="300" y="195" font-family="Montserrat,sans-serif" font-size="8" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">M&amp;A</text>
  <text x="300" y="207" font-family="Montserrat,sans-serif" font-size="5" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="0.5">UNISTONE</text>

  <!-- Floating stats pills -->
  <rect x="220" y="72" width="160" height="32" rx="16" fill="rgba(29,108,240,0.15)" stroke="rgba(29,108,240,0.35)" stroke-width="1"/>
  <text x="300" y="93" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" fill="#8ab5ff" text-anchor="middle">100% Конфіденційність</text>

  <rect x="40" y="305" width="130" height="28" rx="14" fill="rgba(203,161,90,0.12)" stroke="rgba(203,161,90,0.3)" stroke-width="1"/>
  <text x="105" y="324" font-family="Montserrat,sans-serif" font-size="10" font-weight="700" fill="#f0d29e" text-anchor="middle">NDA · Due Diligence</text>

  <rect x="430" y="305" width="130" height="28" rx="14" fill="rgba(29,108,240,0.12)" stroke="rgba(29,108,240,0.3)" stroke-width="1"/>
  <text x="495" y="324" font-family="Montserrat,sans-serif" font-size="10" font-weight="700" fill="#8ab5ff" text-anchor="middle">Закрита мережа</text>

  <!-- Decorative circuit lines -->
  <g stroke="rgba(29,108,240,0.15)" stroke-width="1" fill="none">
    <line x1="300" y1="88" x2="300" y2="172"/>
    <line x1="300" y1="228" x2="300" y2="320"/>
    <circle cx="300" cy="88" r="3" fill="#1d6cf0" opacity="0.4"/>
    <circle cx="300" cy="320" r="3" fill="#cba15a" opacity="0.4"/>
  </g>
</svg>
